<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ARGOS AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="argos-app">

    <header class="app-header">
      <div>
        <div class="brand">ARGOS AI</div>
        <div class="subtitle">ONE CLICK AI TRADING</div>
      </div>
      <div class="paper-badge">PAPER ONLY</div>
    </header>

    <main class="main-screen">

      <section class="ai-card">
        <div class="ai-status" id="heroPermission">-</div>
        <div class="ai-decision" id="heroAiBias">-</div>
        <div class="ai-confidence" id="heroConfidence">-</div>

        <div class="risk-chip">
          <span>Risk</span>
          <strong id="heroRiskMode">-</strong>
        </div>
      </section>

      <section class="auto-panel">
        <button class="auto-start" onclick="loadData()">AUTO START</button>
        <button class="auto-stop">AUTO STOP</button>
      </section>

      <section class="metrics">
        <div>
          <span>Balance</span>
          <strong id="currentBalance">0</strong>
        </div>
        <div>
          <span>Today PnL</span>
          <strong id="pnl">0</strong>
        </div>
        <div>
          <span>Win Rate</span>
          <strong id="winRate">0%</strong>
        </div>
        <div>
          <span>Position</span>
          <strong id="openPositions">0</strong>
        </div>
      </section>

      <section class="last-action-card">
        <span>Last Action</span>
        <strong id="aiPermission">-</strong>
        <p id="aiReason">Waiting for AI decision...</p>
      </section>

    </main>

    <!-- Hidden compatibility targets for app.js -->
    <div class="hidden">
      <strong id="mainSymbol">ARGOS</strong>
      <strong id="tradePermission">-</strong>
      <strong id="startBalance">0</strong>
      <strong id="totalReturn">0%</strong>
      <strong id="wins">0</strong>
      <strong id="losses">0</strong>
      <strong id="total">0</strong>
      <strong id="avgWin">0</strong>
      <strong id="avgLoss">0</strong>
      <strong id="profitFactor">0</strong>
      <strong id="healthStatus">-</strong>

      <div id="radarGrid"></div>
      <span id="marketUpdated">-</span>
      <table><tbody id="marketRows"></tbody></table>

      <strong id="aiMode">-</strong>
      <strong id="aiBias">-</strong>
      <strong id="aiConfidence">-</strong>

      <strong id="newsMode">-</strong>
      <strong id="newsSentiment">-</strong>
      <strong id="newsRisk">-</strong>

      <strong id="macroMode">-</strong>
      <strong id="macroRegime">-</strong>
      <strong id="macroDxy">-</strong>
      <strong id="macroRate">-</strong>

      <strong id="backtestMode">-</strong>
      <strong id="backtestStrategy">-</strong>
      <strong id="backtestTrades">0</strong>
      <strong id="backtestWinRate">0%</strong>
      <strong id="backtestPnl">0</strong>

      <table><tbody id="positionRows"></tbody></table>
      <table><tbody id="decisionRows"></tbody></table>
      <table><tbody id="newsRows"></tbody></table>
      <table><tbody id="macroRows"></tbody></table>
      <table><tbody id="symbolRows"></tbody></table>
      <table><tbody id="trades"></tbody></table>
      <table><tbody id="systemRows"></tbody></table>

      <span id="healthFilesOk">0</span>
      <span id="healthFilesTotal">0</span>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
